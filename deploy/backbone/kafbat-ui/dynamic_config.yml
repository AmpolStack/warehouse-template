kafka:
  clusters:
    - name: local
      bootstrap-servers: kafka:9092

      kafka-connect:
        - name: debezium
          address: http://debezium-connect:8083

      default-key-serde: String
      default-value-serde: String

  admin-client-timeout: 30000

  polling:
    poll-timeout-ms: 1000
    max-page-size: 500
    default-page-size: 100